services:
  mongo-db:
    image: mongo:latest
    container_name: mongo-db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:password@mongo-db:27017/
      ME_CONFIG_BASICAUTH_ENABLED: "true"
      ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
      ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
    depends_on:
      - mongo-db

  backend:
    image: viral17022005/chat-app-backend:latest
    container_name: backend-app
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      mongo-db:
        condition: service_healthy
    environment:
      - MONGODB_URI=mongodb://root:password@mongo-db:27017/chat-app?authSource=admin
    ports:
      - "5000:5000"

  frontend:
    image: viral17022005/chat-app-frontend:latest
    container_name: frontend-app
    restart: always
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
